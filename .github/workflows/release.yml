name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-rs
        run: cargo install cross

      - name: Cross-compile all binaries for aarch64
        run: cross build --workspace --release --target aarch64-unknown-linux-gnu

      - name: Generate overlay assets
        run: python3 scripts/generate_overlays.py

      - name: Prepare release bundle
        run: |
          mkdir -p release/Cartridge/assets/fonts
          mkdir -p release/Cartridge/assets/overlays
          # Binaries
          cp target/aarch64-unknown-linux-gnu/release/cartridge release/Cartridge/
          cp target/aarch64-unknown-linux-gnu/release/cartridge-boot release/Cartridge/
          chmod +x release/Cartridge/cartridge
          chmod +x release/Cartridge/cartridge-boot

          # Boot scripts
          cp deploy/cartridge-boot.sh release/Cartridge/
          cp deploy/cartridge-boot.service release/Cartridge/
          cp deploy/autosetup.sh release/Cartridge/
          chmod +x release/Cartridge/cartridge-boot.sh
          chmod +x release/Cartridge/autosetup.sh

          # Registry
          cp registry.json release/Cartridge/ 2>/dev/null || true

          # Assets
          cp -r assets/fonts/* release/Cartridge/assets/fonts/
          cp -r assets/overlays/* release/Cartridge/assets/overlays/

          # Lua cartridges (bundled apps with icons)
          cp -r lua_cartridges release/Cartridge/lua_cartridges

          # Tools menu scripts (inside Cartridge/ so extracting doesn't overwrite existing tools)
          mkdir -p release/Cartridge/tools
          cp "deploy/tools/Cartridge.sh" release/Cartridge/tools/
          cp "deploy/tools/Setup Cartridge Boot.sh" release/Cartridge/tools/
          cp "deploy/tools/Undo Cartridge Boot.sh" release/Cartridge/tools/
          chmod +x release/Cartridge/tools/*.sh

          # Install instructions
          cp INSTALL.md release/INSTALL.txt 2>/dev/null || true

      - name: Create zip
        working-directory: release
        run: zip -r ../cartridge-r36s-plus.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cartridge-r36s-plus.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `cartridge-r36s-plus.zip`
            2. Extract the zip to your SD card's `roms/` folder (creates `roms/Cartridge/`)
            3. Copy the 3 `.sh` files from `roms/Cartridge/tools/` into `roms/tools/`
            4. Boot your device into EmulationStation
            5. Go to **Tools > Cartridge** to launch (auto-sets up boot selector on first run)
            6. On next reboot, you'll see the CartridgeOS/EmulationStation boot chooser

            See `INSTALL.txt` in the zip for full instructions.
