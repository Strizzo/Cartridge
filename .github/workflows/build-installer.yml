name: Build Device Installer

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos
            artifact: Cartridge-Installer-macOS
            sep: ":"
          - os: ubuntu-latest
            name: linux
            artifact: Cartridge-Installer-Linux
            sep: ":"
          - os: windows-latest
            name: windows
            artifact: Cartridge-Installer-Windows.exe
            sep: ";"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --name "${{ matrix.artifact }}"
          --clean
          --add-data "src${{ matrix.sep }}src"
          --add-data "cartridges${{ matrix.sep }}cartridges"
          --add-data "pyproject.toml${{ matrix.sep }}."
          --add-data "install.sh${{ matrix.sep }}."
          --add-data "registry.json${{ matrix.sep }}."
          install_to_device.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
