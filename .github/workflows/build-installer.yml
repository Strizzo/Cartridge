name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 development libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libsdl2-gfx-dev libsdl2-image-dev

      - name: Build all binaries
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Upload cartridge binary
        uses: actions/upload-artifact@v4
        with:
          name: cartridge-linux-x86_64
          path: target/release/cartridge

      - name: Upload cartridge-boot binary
        uses: actions/upload-artifact@v4
        with:
          name: cartridge-boot-linux-x86_64
          path: target/release/cartridge-boot

  cross-compile:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-rs
        run: cargo install cross

      - name: Cross-compile all binaries for aarch64
        run: cross build --workspace --release --target aarch64-unknown-linux-gnu

      - name: Generate overlay assets
        run: python3 scripts/generate_overlays.py

      - name: Prepare device bundle
        run: |
          mkdir -p bundle/Cartridge/assets/fonts
          mkdir -p bundle/Cartridge/assets/overlays
          # Binaries
          cp target/aarch64-unknown-linux-gnu/release/cartridge bundle/Cartridge/
          cp target/aarch64-unknown-linux-gnu/release/cartridge-boot bundle/Cartridge/
          chmod +x bundle/Cartridge/cartridge
          chmod +x bundle/Cartridge/cartridge-boot

          # Boot scripts
          cp deploy/cartridge-boot.sh bundle/Cartridge/
          cp deploy/cartridge-boot.service bundle/Cartridge/
          cp deploy/autosetup.sh bundle/Cartridge/
          chmod +x bundle/Cartridge/cartridge-boot.sh
          chmod +x bundle/Cartridge/autosetup.sh

          # Registry
          cp registry.json bundle/Cartridge/ 2>/dev/null || true

          # Assets
          cp -r assets/fonts/* bundle/Cartridge/assets/fonts/ 2>/dev/null || true
          cp -r assets/overlays/* bundle/Cartridge/assets/overlays/ 2>/dev/null || true
          cp assets/boot_logo.png bundle/Cartridge/assets/ 2>/dev/null || true

          # Lua cartridges (bundled apps with icons)
          cp -r lua_cartridges bundle/Cartridge/lua_cartridges 2>/dev/null || true

          # Tools menu scripts (inside Cartridge/ so they don't overwrite existing tools)
          mkdir -p bundle/Cartridge/tools
          cp "deploy/tools/Cartridge.sh" bundle/Cartridge/tools/
          cp "deploy/tools/Setup Cartridge Boot.sh" bundle/Cartridge/tools/
          cp "deploy/tools/Undo Cartridge Boot.sh" bundle/Cartridge/tools/
          chmod +x bundle/Cartridge/tools/*.sh

      - name: Upload aarch64 device bundle
        uses: actions/upload-artifact@v4
        with:
          name: cartridge-device-bundle-aarch64
          path: bundle/
